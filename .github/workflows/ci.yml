name: Node CI Pipeline

on:
  workflow_call:

jobs:

  ci:
    runs-on: ubuntu-latest

    outputs:
      commit_id: ${{ steps.commit.outputs.commit_id }}

    steps:

      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Get Commit ID
        id: commit
        run: |
          COMMIT_ID=${GITHUB_SHA::7}
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Lint Code
        run: npm run lint || echo "No lint configured"

      - name: Run Tests
        run: npm test || echo "No tests configured"

      - name: Build App
        run: npm run build || echo "No build step"

      - name: Start App Test
        run: |
          node src/app.js &
          sleep 5

      - name: Build Docker Image
        run: |
          docker build -t node-demo:${{ steps.commit.outputs.commit_id }} .

      - name: Push Docker Image (Dummy)
        run: |
          IMAGE=node-demo:${{ steps.commit.outputs.commit_id }}
          REGISTRY=docker.io/demo-registry
          echo "Pushing $IMAGE to $REGISTRY"
          echo "Docker image pushed successfully (simulated)"

  cd:
    needs: ci
    uses: shravansonone/RTB-GH-Action/.github/workflows/cd.yml@main
    with:
      image_tag: ${{ needs.ci.outputs.commit_id }}
