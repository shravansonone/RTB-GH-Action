name: Node CI Pipeline

on:
  workflow_call:

jobs:

  ci:
    runs-on: ubuntu-latest

    outputs:
      commit_id: ${{ steps.commit.outputs.commit_id }}

    steps:

      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Get Commit ID
        id: commit
        run: |
          COMMIT_ID=${GITHUB_SHA::7}
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Lint Code
        run: npm run lint || echo "No lint configured"

      - name: Run Tests
        run: npm test || echo "No tests configured"

      - name: Build App
        run: npm run build || echo "No build step"

      - name: Start App Test
        run: |
          node src/app.js &
          sleep 5

      - name: Build Docker Image
        run: |
          docker build -t node-demo:${{ steps.commit.outputs.commit_id }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag node-demo:${{ steps.commit.outputs.commit_id }} \
          ${{ secrets.DOCKER_USERNAME }}/node-demo:${{ steps.commit.outputs.commit_id }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/node-demo:${{ steps.commit.outputs.commit_id }}

  cd:
    needs: ci
    uses: shravansonone/RTB-GH-Action/.github/workflows/cd.yaml@main
    with:
      image_tag: ${{ steps.commit.outputs.commit_id }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
