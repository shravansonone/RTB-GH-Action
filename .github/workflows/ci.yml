name: Node CI Pipeline

on:
  workflow_call:

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Set Commit ID
        run: echo "COMMIT_ID=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Lint Code
        run: npm run lint || echo "No lint configured"

      - name: Run Tests
        run: npm test || echo "No tests configured"

      - name: Build App
        run: npm run build || echo "No build step"

      - name: Start App Test
        run: |
          node src/app.js &
          sleep 5

      - name: Build Docker Image
        run: docker build -t node-demo:${{ env.COMMIT_ID }} .

      - name: Push Docker Image (Dummy)
        run: |
          IMAGE_NAME=node-demo
          IMAGE_TAG=${{ env.COMMIT_ID }}
          REGISTRY=docker.io/demo-registry

          echo "Pushing Docker image to registry..."
          echo "Image: $REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          echo "Docker image successfully pushed (simulated)"
