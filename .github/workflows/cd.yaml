name: Node CD Pipeline

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to Kubernetes (Dummy)
        run: |
          IMAGE=node-demo:${{ inputs.image_tag }}
          CLUSTER=demo-k8s-cluster

          echo "Deploying $IMAGE to Kubernetes cluster $CLUSTER"
          echo "Deployment successful (simulated)"

      - name: Sanity Check Environment
        run: |
          APP_URL=http://demo-app.example.com
          echo "Running sanity check on $APP_URL"
          echo "Application responded with HTTP 200"
          echo "Environment is healthy"

      - name: Send Email Notification (Dummy)
        run: |
          EMAIL=dev-team@example.com
          echo "Sending deployment email..."
          echo "To: $EMAIL"
          echo "Subject: Deployment Successful"
          echo "Body: Application deployed successfully and environment is healthy"
          echo "Email sent (simulated)"
