name: Node CD Pipeline

on:
  workflow_call:
    inputs:
      image_tag:
        required: false
        type: string
        default: "latest"
    secrets:
      GH_USERNAME:
        required: true
      GH_PAT:
        required: true
      EC2_SSH_KEY:
        required: true
      EC2_HOST:
        required: true

jobs:
  cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Deploy to EC2 and apply Kubernetes deployment
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ec2-user@$EC2_HOST << EOF

          echo "🚀 Cloning or updating repo on EC2"

          cd /home/ec2-user/app || mkdir -p /home/ec2-user/app && cd /home/ec2-user/app

          if [ ! -d ".git" ]; then
            git clone https://$GH_USERNAME:$GH_PAT@github.com/$REPO .
          else
            git pull https://$GH_USERNAME:$GH_PAT@github.com/$REPO main
          fi

          # Use provided tag or default to 'latest'
          TAG="${IMAGE_TAG:-latest}"
          echo "🚀 Using image tag: $TAG"

          # Safety check for kubectl
          echo "🚀 Checking kubectl installation and cluster context"
          if command -v kubectl &> /dev/null; then
            kubectl cluster-info || echo "⚠️ Could not get cluster info"
          else
            echo "⚠️ kubectl not installed, skipping cluster check"
          fi

          echo "🚀 Applying deployment to Kubernetes"
          if command -v kubectl &> /dev/null; then
            kubectl apply -f k8s/deployment.yaml
          else
            echo "⚠️ kubectl not installed, skipping apply"
          fi

          echo "✅ Deployment completed"
          EOF
