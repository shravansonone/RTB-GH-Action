name: Node CD Pipeline

on:
  workflow_call:
    secrets:
      GH_USERNAME:
        required: true
      GH_PAT:
        required: true
      EC2_SSH_KEY:
        required: true
      EC2_HOST:
        required: true

jobs:
  cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Deploy to EC2 and apply Kubernetes deployment
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ec2-user@$EC2_HOST << EOF

          echo "🚀 Cloning or updating repo on EC2"

          cd /home/ec2-user/app || mkdir -p /home/ec2-user/app && cd /home/ec2-user/app

          if [ ! -d ".git" ]; then
            git clone https://$GH_USERNAME:$GH_PAT@github.com/$REPO .
          else
            git pull https://$GH_USERNAME:$GH_PAT@github.com/$REPO main
          fi

          echo "🚀 Applying deployment to Kubernetes"

          kubectl apply -f k8s/deployment.yaml

          echo "✅ Deployment applied successfully"
          EOF
