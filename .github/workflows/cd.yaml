name: Node CD Pipeline

on:
  workflow_call:
    inputs:
      commit_id:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Print Commit ID
        run: echo "Deploying image with tag ${{ inputs.commit_id }}"
