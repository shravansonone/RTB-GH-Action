name: Node CD Pipeline

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      GH_USERNAME:
        required: true
      GH_PAT:
        required: true
      DOCKER_USERNAME:
        required: true
      EC2_SSH_KEY:
        required: true
      EC2_HOST:
        required: true

jobs:
  cd:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2 (Minikube)
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@${{ secrets.EC2_HOST }} << EOF

            IMAGE_TAG=${{ inputs.image_tag }}
            echo "🚀 Updating deployment.yaml with tag $IMAGE_TAG"

            cd /home/ec2-user/app

            # Clone repo if not exists
            if [ ! -d ".git" ]; then
              git clone https://${{ secrets.GH_USERNAME }}:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} .
            else
              git pull https://${{ secrets.GH_USERNAME }}:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} main
            fi

            # Update deployment.yaml image
            sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/node-demo:$IMAGE_TAG|g" k8s/deployment.yaml

            # Commit and push changes
            git config user.name "${{ secrets.GH_USERNAME }}"
            git config user.email "${{ secrets.GH_USERNAME }}@users.noreply.github.com"

            git add k8s/deployment.yaml
            git commit -m "Update image to $IMAGE_TAG" || echo "No changes to commit"
            git push https://${{ secrets.GH_USERNAME }}:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} HEAD:main

            echo "✅ Deployment Completed"

          EOF

      - name: Check Application Running
        run: |
          echo "🔍 Verifying if application is running..."
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@${{ secrets.EC2_HOST }} << EOF

            APP_IP=$(minikube ip)
            APP_PORT=3000
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://$APP_IP:$APP_PORT || echo "000")

            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Application is running at http://$APP_IP:$APP_PORT"
            else
              echo "❌ Application is not reachable (HTTP $RESPONSE)"
              exit 1
            fi

          EOF
