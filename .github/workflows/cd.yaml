name: Node CD Pipeline

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      GH_USERNAME:
        required: true
      GH_PAT:
        required: true
      DOCKER_USERNAME:
        required: true
      EC2_SSH_KEY:
        required: true
      EC2_HOST:
        required: true

jobs:
  cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Deploy to EC2
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          REPO: ${{ github.repository }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ec2-user@$EC2_HOST << EOF
          
          echo "🚀 Updating deployment.yaml with tag $IMAGE_TAG"

          cd /home/ec2-user/app

          # Clone repo if not exists
          if [ ! -d ".git" ]; then
            git clone https://$GH_USERNAME:$GH_PAT@github.com/$REPO .
          else
            git pull https://$GH_USERNAME:$GH_PAT@github.com/$REPO main
          fi

          # Update deployment.yaml image
          sed -i "s|image:.*|image: $DOCKER_USERNAME/node-demo:$IMAGE_TAG|g" k8s/deployment.yaml

          # Commit and push changes
          git config user.name "$GH_USERNAME"
          git config user.email "$GH_USERNAME@users.noreply.github.com"

          git add k8s/deployment.yaml
          git commit -m "Update image to $IMAGE_TAG" || echo "No changes to commit"
          git push https://$GH_USERNAME:$GH_PAT@github.com/$REPO HEAD:main

          echo "✅ Deployment Completed"
          EOF
