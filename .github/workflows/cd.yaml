name: Node CD Pipeline

on:
  workflow_run:
    workflows: ["Node CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying docker image to Kubernetes cluster (simulated)"

      - name: Sanity Check
        run: |
          echo "Checking application health endpoint"
          echo "Application responded with HTTP 200 (simulated)"

      - name: Send Email
        run: |
          echo "Sending deployment email notification (simulated)"
